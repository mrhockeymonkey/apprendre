<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>apprendre</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f0f0f;
      font-family: 'Georgia', serif;
    }

    .hero {
      text-align: center;
    }

    .title {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #f5f5f5;
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: clamp(0.9rem, 2.5vw, 1.25rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: #444;
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="title">apprendre</h1>
    <div class="divider"></div>
    <p class="subtitle">to learn</p>
  </main>
</body>
</html>
