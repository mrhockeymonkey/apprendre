<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>apprendre</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      font-family: 'Haas', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    }

    .hero {
      text-align: center;
      filter: drop-shadow(rgba(45,127,249,0.10) 0px 2px 8px);
    }

    .title {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 400;
      letter-spacing: normal;
      color: #181d26;
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: clamp(0.9rem, 2.5vw, 1.25rem);
      letter-spacing: 0.28px;
      text-transform: uppercase;
      color: rgba(4,14,32,0.69);
    }

    .divider {
      width: 4rem;
      height: 1px;
      background: #1b61c9;
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="title">apprendre</h1>
    <div class="divider"></div>
    <p class="subtitle">to learn</p>
  </main>
</body>
</html>
